name: ai_career_os
description: AI Career Operating System — Intelligent Resume Builder
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  firebase_remote_config: ^5.1.3

  # Auth
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.3.0

  # Code Generation / Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI / Design
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  percent_indicator: ^4.2.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  skeletonizer: ^1.4.2
  animate_do: ^3.3.4

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # AI
  google_generative_ai: ^0.4.6

  # Utilities
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  uuid: ^4.5.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
